<div class="bmwBackground container-fluid">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            <div class="p-4 rounded bg-dark bg-opacity-50 text-white">
                <label class="form-label w-100">
                    Email:
                    <input class="form-control bg-white" type="text" [formField]="fromMain().email" (keyup)="onEmailInput()" />
                </label>
                @if(show() === false) {
                    <button class="btn btn-primary mt-2" type="button" (click)="onEmailInput()">Submit</button>
                    <app-error-validation [fieldState]="fromMain().email()" />
                }

                @if(show() === true) {
                    <label class="form-label w-100 mt-3">
                        Password:
                        <input class="form-control bg-white" type="password" [formField]="fromMain().password" />
                        <app-error-validation [fieldState]="fromMain().password()" />
                    </label>

                    @if (!isRegistered()) {
                        <label class="form-label w-100 mt-3">
                            Confirm Password:
                            <input class="form-control bg-white" type="password" [formField]="fromMain().confirmPassword" />
                            <app-error-validation [fieldState]="fromMain().confirmPassword()" />
                        </label>
                    }

                    @if(isRegistered() === true) {
                        <button class="btn btn-success mt-2" type="button" (click)="onSignIn()">Sign In</button>
                    }

                    @if(isRegistered() === false) {
                        <button class="btn btn-success mt-2" type="button" (click)="saveUser()">Register</button>
                    }
                }
            </div>
        </div>
    </div>
</div>
