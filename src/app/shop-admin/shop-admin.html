<div class="container py-5 ">
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="card shadow">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Sveiks, admin!</h4>
        </div>
        <div class="card-body admin-grid">
          @for (auto of autosForm.allAutos; track $index; let i = $index) {
          <section class="auto-window">
            <div class="window-header">
              <h5 class="mb-0">Auto #{{ i + 1 }}</h5>
            </div>

            <div class="mb-3">
              <label for="model-{{ i }}" class="form-label">Modelis</label>
              <input type="text" id="model-{{ i }}" class="form-control" placeholder="Modelis" [formField]="auto.model">
            </div>

            <div class="mb-3">
              <label for="year-{{ i }}" class="form-label">Gads</label>
              <input type="number" id="year-{{ i }}" class="form-control" placeholder="Gads" [formField]="auto.year">
            </div>

            <div class="mb-3">
              <label for="color-{{ i }}" class="form-label">Krāsa</label>
              <input type="text" id="color-{{ i }}" class="form-control" placeholder="Krāsa" [formField]="auto.color">
            </div>

            <div class="mb-3">
              <label for="milage-{{ i }}" class="form-label">Nobraukums</label>
              <div class="input-group">
                <input type="number" id="milage-{{ i }}" class="form-control" placeholder="Nobraukums" [formField]="auto.milage">
                <span class="input-group-text">km</span>
              </div>
            </div>

            <div class="mb-3">
              <label for="price-{{ i }}" class="form-label">Cena</label>
              <div class="input-group">
                <input type="number" id="price-{{ i }}" class="form-control" placeholder="Cena" [formField]="auto.price">
                <span class="input-group-text">EUR</span>
              </div>
            </div>

            <div class="mb-3">
              <label for="quantity-{{ i }}" class="form-label">Daudzums</label>
              <input type="number" id="quantity-{{ i }}" class="form-control" placeholder="Daudzums" [formField]="auto.quantity">
            </div>

            <div class="d-grid">
              @if(auto.id == null) {
              <div class="col-12 justify-content-center d-flex">
                <button type="button" class="btn btn-outline-success" (click)="onSubmit(i)">Pievienot datu bāzei!</button>
              </div>
              }@else {
               <div class="col-12 justify-content-center d-flex gap-2">
                <button type="button" class="btn btn-outline-success" (click)="onUpdate(i)">Atjaunināt datu bāzi!</button>
                <button type="button" class="btn btn-outline-danger" (click)="onDelete(i)">Dzēst</button>
              </div>
              }
            </div>
          </section>
          }
        </div>
      </div>
    </div>
  </div>
</div>
